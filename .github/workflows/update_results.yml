name: Update Match Results

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes during matches
  workflow_dispatch:          # allows manual trigger from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv
          pip install "httpcore==0.17.3" "httpx==0.24.1"
          pip install "supabase==2.3.0" --no-deps
          pip install "gotrue==1.3.0" "postgrest==0.13.2" "realtime==1.0.2" "storage3==0.5.4" "supafunc==0.3.1"

      - name: Run update script
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/update_results.py