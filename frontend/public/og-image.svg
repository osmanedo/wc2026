<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1a472a"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Trophy (pure SVG, no emoji) centred at 600,210 scaled ~120px tall -->
  <g transform="translate(540,110) scale(5)">
    <!-- Cup body -->
    <path d="M6 2 h12 l-2 10 q-4 6 -8 0 Z" fill="#f59e0b"/>
    <!-- Handles -->
    <path d="M6 4 Q0 4 0 9 Q0 13 6 12" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <path d="M18 4 Q24 4 24 9 Q24 13 18 12" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <!-- Stem -->
    <rect x="10" y="12" width="4" height="5" fill="#f59e0b"/>
    <!-- Base -->
    <rect x="7" y="17" width="10" height="2.5" rx="1" fill="#f59e0b"/>
    <!-- Shine -->
    <path d="M9 4 Q10 7 9 10" fill="none" stroke="#fde68a" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="600" y="390" font-size="72" font-weight="800" text-anchor="middle"
    font-family="Arial Black,Arial,sans-serif" fill="#ffffff" letter-spacing="-1">
    WC2026 Fantasy
  </text>

  <!-- Description -->
  <text x="600" y="450" font-size="30" text-anchor="middle"
    font-family="Arial,sans-serif" fill="#52b788" letter-spacing="0.3">
    Pick scores · Compete with friends · AI match briefs
  </text>

  <!-- URL pill -->
  <rect x="450" y="495" width="300" height="44" rx="22" fill="#52b788" opacity="0.2"/>
  <text x="600" y="524" font-size="22" text-anchor="middle"
    font-family="Arial,sans-serif" fill="#52b788">
    wc2026fantasy.app
  </text>
</svg>
